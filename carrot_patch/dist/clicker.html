<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carrot Clicker</title>
<style>
html, body { margin: 0; padding: 0; }
/* Carrot Clicker — layout & chrome */
#cc-root {
  --bg1: #141a12;
  --bg2: #0d0b08;
  --panel: rgba(22, 17, 11, 0.86);
  --panel-edge: rgba(255, 200, 120, 0.14);
  --text: #f3e9d6;
  --dim: #b8a98c;
  --carrot: #ff9232;
  --leaf: #6fbf5a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(ellipse 90% 60% at 50% -10%, #2a3a2a 0%, transparent 60%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
  color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  user-select: none;
}

/* ---------- news ticker ---------- */
#ticker {
  background: rgba(0, 0, 0, 0.4);
  border-bottom: 1px solid var(--panel-edge);
  padding: 7px 16px;
  font-size: 13px;
  font-style: italic;
  color: #d8c9a8;
  text-align: center;
  min-height: 31px;
}
#ticker-text { transition: opacity 0.4s; }

/* ---------- columns ---------- */
#columns {
  display: flex;
  gap: 14px;
  padding: 14px;
  max-width: 1180px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
  align-items: flex-start;
  flex: 1;
}
#col-left { width: 340px; flex-shrink: 0; text-align: center; }
#col-mid { flex: 1; min-width: 260px; position: relative; }
#col-right { width: 330px; flex-shrink: 0; }
@media (max-width: 900px) {
  #columns { flex-direction: column; align-items: stretch; }
  #col-left, #col-right { width: 100%; }
}

/* ---------- left: the carrot ---------- */
.wordmark {
  margin: 4px 0 10px;
  font-size: 19px;
  letter-spacing: 0.3em;
  font-weight: 800;
  color: var(--carrot);
  text-shadow: 0 2px 12px rgba(255, 120, 20, 0.35);
}
.wordmark span { color: var(--leaf); }
#bank {
  font-size: 34px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
}
#bank-label { color: var(--dim); font-size: 12px; letter-spacing: 0.2em; margin: 2px 0 4px; }
#cps { color: var(--dim); font-size: 13px; font-variant-numeric: tabular-nums; }
#buff-line { min-height: 20px; font-size: 12.5px; font-weight: 800; color: #ffd98a; margin-top: 3px; }
#patch-line {
  font-size: 12px;
  font-weight: 700;
  color: #8fd4f5;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
#hero {
  display: block;
  width: 100%;
  height: auto;
  margin: 8px auto 6px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 14px 44px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--panel-edge);
  background: #1b2415;
  touch-action: manipulation;
}
#hero:active { transform: scale(0.995); }
#seed-line { font-size: 12.5px; color: #eab8e4; min-height: 18px; }
#prestige-btn {
  margin-top: 6px;
  width: 100%;
  padding: 10px;
  font-size: 15px;
  font-weight: 800;
  color: #2a0e1a;
  background: linear-gradient(180deg, #f5c8ec, #d98cc9);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(217, 140, 201, 0.35);
}
#prestige-btn:hover { filter: brightness(1.08); }
.small-controls { margin-top: 8px; display: flex; gap: 6px; justify-content: center; }
.small-controls button {
  background: var(--panel);
  border: 1px solid var(--panel-edge);
  color: var(--text);
  border-radius: 8px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 14px;
}

/* ---------- middle ---------- */
.panel-title {
  font-size: 10.5px;
  letter-spacing: 0.22em;
  color: var(--dim);
  margin: 12px 0 6px;
  font-weight: 700;
}
.panel-title:first-child { margin-top: 0; }
#upgrades {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 40px;
}
.upgrade {
  background: linear-gradient(180deg, rgba(60, 45, 25, 0.9), rgba(40, 30, 18, 0.9));
  border: 1px solid rgba(255, 200, 120, 0.35);
  border-radius: 8px;
  padding: 6px 9px;
  font-size: 12px;
  cursor: pointer;
  line-height: 1.35;
}
.upgrade b { display: block; color: #ffd98a; font-size: 12px; }
.upgrade .cost { color: var(--leaf); font-variant-numeric: tabular-nums; }
.upgrade.cant { opacity: 0.45; cursor: default; }
.upgrade:not(.cant):hover { border-color: #ffd98a; transform: translateY(-1px); }

#ribbons { display: flex; gap: 8px; flex-wrap: wrap; min-height: 30px; align-items: center; }
.ribbon {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.5);
  position: relative;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
}
.ribbon::after {
  content: '';
  position: absolute;
  left: 5px; top: 20px;
  width: 4px; height: 10px;
  background: inherit;
  opacity: 0.7;
}
.ribbon.locked { background: #333 !important; opacity: 0.35; }

#stats {
  background: var(--panel);
  border: 1px solid var(--panel-edge);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.8;
  color: var(--dim);
}
#stats b { color: var(--text); float: right; font-variant-numeric: tabular-nums; }
#stats div { clear: both; }

#tooltip {
  position: sticky;
  bottom: 10px;
  margin-top: 12px;
  background: rgba(12, 9, 6, 0.95);
  border: 1px solid #ffd98a55;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.5;
  z-index: 5;
}
#tooltip b { color: #ffd98a; }
#tooltip .flavor { font-style: italic; color: var(--dim); }

/* ---------- right: shop ---------- */
.shop-head { display: flex; justify-content: space-between; align-items: center; }
#buy-amount button {
  background: var(--panel);
  border: 1px solid var(--panel-edge);
  color: var(--dim);
  border-radius: 6px;
  padding: 2px 8px;
  cursor: pointer;
  font-size: 11px;
  margin-left: 4px;
}
#buy-amount button.on { color: var(--carrot); border-color: var(--carrot); }
#shop { display: flex; flex-direction: column; gap: 6px; }
.b-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--panel);
  border: 1px solid var(--panel-edge);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  gap: 8px;
}
.b-row:not(.cant):hover { border-color: var(--carrot); }
.b-row.cant { opacity: 0.5; cursor: default; }
.b-row .b-name { font-weight: 700; font-size: 13.5px; }
.b-row .b-cost { font-size: 11.5px; color: var(--leaf); font-variant-numeric: tabular-nums; }
.b-row .b-count {
  font-size: 19px;
  font-weight: 900;
  color: rgba(255, 210, 150, 0.5);
  font-variant-numeric: tabular-nums;
  min-width: 34px;
  text-align: right;
}
.b-row.mystery { opacity: 0.35; }
.b-row.mystery .b-name { color: var(--dim); }

/* ---------- toasts & modal ---------- */
#toasts {
  position: fixed;
  top: 46px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 20;
  pointer-events: none;
}
.toast {
  background: rgba(20, 14, 8, 0.95);
  border: 1px solid #ffd98a88;
  color: #ffd98a;
  border-radius: 999px;
  padding: 8px 18px;
  font-size: 13.5px;
  font-weight: 700;
  animation: toast-in 0.25s ease-out;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
}
@keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } }

#modal {
  position: fixed; inset: 0;
  background: rgba(5, 4, 2, 0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 30;
}
#modal-box {
  background: linear-gradient(180deg, #241a10, #17110a);
  border: 1px solid #ffd98a55;
  border-radius: 14px;
  padding: 22px 26px;
  max-width: 430px;
  text-align: center;
}
#modal-box h2 { margin: 0 0 10px; color: #eab8e4; }
#modal-box p { font-size: 14px; line-height: 1.6; color: var(--text); }
#modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
#modal-buttons button {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  font-weight: 800;
  cursor: pointer;
  font-size: 14px;
}
#modal-yes { background: linear-gradient(180deg, #f5c8ec, #d98cc9); color: #2a0e1a; }
#modal-no { background: #3a2f24; color: var(--text); }

.hidden { display: none !important; }

</style>
</head>
<body>
<div id="cc-root">
  <div id="ticker"><span id="ticker-text"></span></div>

  <div id="columns">
    <section id="col-left">
      <h1 class="wordmark">CARROT <span>CLICKER</span></h1>
      <div id="bank">0</div>
      <div id="bank-label">carrots</div>
      <div id="cps">0 per second</div>
      <div id="patch-line" class="hidden"></div>
      <div id="buff-line"></div>
      <canvas id="hero" width="320" height="360"></canvas>
      <div id="seed-line"></div>
      <button id="prestige-btn" class="hidden">🌸 Go to Seed</button>
      <div class="small-controls">
        <button id="mute-btn" title="toggle sound">🔊</button>
        <button id="wipe-btn" title="wipe save (hold to confirm)">🗑</button>
      </div>
    </section>

    <section id="col-mid">
      <div class="panel-title">UPGRADES</div>
      <div id="upgrades"></div>
      <div class="panel-title">TROPHY SHELF</div>
      <div id="ribbons"></div>
      <div class="panel-title">STATS</div>
      <div id="stats"></div>
      <div id="tooltip" class="hidden"></div>
    </section>

    <section id="col-right">
      <div class="panel-title shop-head">
        <span>THE GARDEN</span>
        <span id="buy-amount"><button data-n="1" class="on">×1</button><button data-n="10">×10</button></span>
      </div>
      <div id="shop"></div>
    </section>
  </div>

  <div id="toasts"></div>

  <div id="modal" class="hidden">
    <div id="modal-box">
      <h2 id="modal-title"></h2>
      <p id="modal-body"></p>
      <div id="modal-buttons">
        <button id="modal-yes"></button>
        <button id="modal-no">Not yet</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ==== data.js ==== */
/* Carrot Clicker — content: buildings, upgrades, ribbons, news. */
globalThis.CC = globalThis.CC || {};

CC.BUILDINGS = [
  { name: 'Window Box', cost: 15, cps: 0.1,
    flavor: 'Three carrots in a trough. Humble. Ambitious.',
    upName: 'Southern Exposure', upFlavor: 'The sun finds them every morning. They lean into it.' },
  { name: 'Garden Plot', cost: 100, cps: 1,
    flavor: 'A proper row of your own. The neighbors are watching.',
    upName: 'Double Digging', upFlavor: 'Two spades deep. The taproots sing.' },
  { name: 'Allotment', cost: 1100, cps: 8,
    flavor: 'Committee-approved carrot production. The bees came free.',
    upName: 'Committee Approval', upFlavor: 'Your motion passes 7–2. The parsnip man abstains, furiously.' },
  { name: 'Market Stall', cost: 12000, cps: 47,
    flavor: 'Sells out by nine. The parsnip man is livid.',
    upName: 'Heritage Certification', upFlavor: 'A laminated sign that says HEIRLOOM. Sales triple. Nothing else changed.' },
  { name: 'Greenhouse', cost: 130000, cps: 260,
    flavor: 'Climate-controlled. The carrots believe it is always June.',
    upName: 'Automatic Misters', upFlavor: 'A fine rain, always at the perfect moment. The carrots applaud quietly.' },
  { name: 'Rabbit Union', cost: 1.4e6, cps: 1400,
    flavor: 'They stopped eating the crop once you offered dental.',
    upName: 'Collective Bargaining', upFlavor: 'The rabbits now guard the rows they once raided. Solidarity forever.' },
  { name: 'Carrot Combine', cost: 2e7, cps: 7800,
    flavor: 'Harvests a field a minute. Slightly haunted.',
    upName: 'Gentler Tines', upFlavor: 'Each carrot is held, briefly, on its way up. Reviews are positive.' },
  { name: 'Mycorrhizal Exchange', cost: 3.3e8, cps: 44000,
    flavor: 'The fungal stock market. The Tomato rings the opening bell.',
    upName: 'Insider Rooting', upFlavor: 'The Parsnip knew about the drought before the clouds did. No charges filed.' },
  { name: 'Orbital Polytunnel', cost: 5.1e9, cps: 260000,
    flavor: 'In space, every direction is down. Taproots love it.',
    upName: 'Aeroponic Chorus', upFlavor: 'Roots humming in the mist. Ground control weeps gently.' },
  { name: 'Carrot Singularity', cost: 7.5e10, cps: 1.6e6,
    flavor: 'All carrots, everywhere, all at once.',
    upName: 'The Long Flowering', upFlavor: 'It blooms. Continents pollinate. Somewhere, a fair judge faints.' },
];

/* Building upgrades are generated at these owned-counts; each doubles that building. */
CC.TIERS = [
  { need: 10, costMult: 10, prefix: null },      /* tier 0 uses the building's own upName */
  { need: 25, costMult: 75, prefix: 'Deeper' },
  { need: 50, costMult: 600, prefix: 'Ancestral' },
  { need: 100, costMult: 5000, prefix: 'Mythic' },
];

CC.CLICK_UPGRADES = [
  { id: 'c0', name: 'Calloused Thumb', cost: 100, mult: 2,
    flavor: 'The blister becomes a callus. The callus becomes technique.' },
  { id: 'c1', name: 'Two-Handed Pull', cost: 2500, mult: 2,
    flavor: 'One hand pulls, the other steadies the earth. Teamwork.' },
  { id: 'c2', name: 'Grandma’s Trowel', cost: 50000, cpsPct: 0.01,
    flavor: 'It remembers every harvest it has ever made. Clicks gain +1% of your CpS.' },
  { id: 'c3', name: 'Proper Technique', cost: 5e6, mult: 3,
    flavor: 'Grip the shoulders, never the greens. Everyone knows this. Nobody does it.' },
  { id: 'c4', name: 'Green Thumbs (Both)', cost: 5e8, cpsPct: 0.02,
    flavor: 'Medically inexplicable. Horticulturally undeniable. Clicks gain +2% of your CpS.' },
];

CC.GLOBAL_UPGRADES = [
  { id: 'g0', name: 'Companion Planting', cost: 75000, mult: 1.10,
    flavor: 'Marigolds at the borders. Everyone grows braver together. +10% everything.' },
  { id: 'g1', name: 'Heirloom Genes', cost: 1e7, mult: 1.15,
    flavor: 'Purple Dragon. Parisian Round. The old names still carry weight. +15% everything.' },
  { id: 'g2', name: 'Free-Range Carrots', cost: 2e9, mult: 1.20,
    flavor: 'They roam. They return. Don’t ask how. +20% everything.' },
  { id: 'g3', name: 'Second Spring', cost: 3e11, mult: 1.25,
    flavor: 'Winter files a formal complaint. It is not upheld. +25% everything.' },
];

/* Bumper crops: every building type grants +1% GLOBAL production at each
   of these owned-counts. Quantity anywhere always pays off everywhere. */
CC.MILESTONES = [10, 25, 50, 100, 150, 200, 300, 400, 500];
CC.MILESTONE_MULT = 1.01;

/* Synergies: cross-tier upgrades — the target building gains +pct per
   `per` building owned. Visible once you own enough of both. */
CC.SYNERGY_UPGRADES = [
  { id: 's0', name: 'Sill-to-Stall Pipeline', cost: 500000, target: 0, per: 3, pct: 0.05,
    needTarget: 25, needPer: 10,
    flavor: 'Every sill in town feeds your stalls. Window Boxes gain +5% per Market Stall.' },
  { id: 's1', name: 'Crop Rotation', cost: 2e6, target: 1, per: 4, pct: 0.05,
    needTarget: 25, needPer: 10,
    flavor: 'The plots rest; the greenhouse doesn’t. Garden Plots gain +5% per Greenhouse.' },
  { id: 's2', name: 'Union Allotments', cost: 2e7, target: 2, per: 5, pct: 0.05,
    needTarget: 25, needPer: 10,
    flavor: 'The rabbits dig. The committee approves. Allotments gain +5% per Rabbit Union.' },
  { id: 's3', name: 'Combine Cooperative', cost: 2e8, target: 3, per: 6, pct: 0.05,
    needTarget: 25, needPer: 10,
    flavor: 'Stalls sell what the combine pulls. Market Stalls gain +5% per Carrot Combine.' },
  { id: 's4', name: 'Greenhouse Futures', cost: 2e9, target: 4, per: 7, pct: 0.05,
    needTarget: 25, needPer: 10,
    flavor: 'June, traded openly on the exchange. Greenhouses gain +5% per Mycorrhizal Exchange.' },
  { id: 's5', name: 'Windowsill Wide Web', cost: 5e10, target: 0, per: 7, pct: 0.20,
    needTarget: 100, needPer: 15,
    flavor: 'Every window box, networked. Window Boxes gain +20% per Mycorrhizal Exchange.' },
  { id: 's6', name: 'Orbital Union Charter', cost: 5e11, target: 5, per: 8, pct: 0.10,
    needTarget: 50, needPer: 10,
    flavor: 'Space rabbits. Unionized. Rabbit Unions gain +10% per Orbital Polytunnel.' },
];

/* Ribbons: permanent multipliers at lifetime-harvest milestones (your trophy shelf). */
CC.RIBBONS = [
  { at: 1e3, name: 'White Ribbon', color: '#e5e7eb', mult: 1.02,
    flavor: 'Third place at the village fête. It’s a start.' },
  { at: 1e5, name: 'Red Ribbon', color: '#dc2626', mult: 1.03,
    flavor: 'Second place. The judge lingered.' },
  { at: 1e7, name: 'Blue Ribbon', color: '#3b82f6', mult: 1.05,
    flavor: 'First place. Somewhere, a gardener nods.' },
  { at: 1e9, name: 'Best in Show', color: '#8b5cf6', mult: 1.08,
    flavor: '“In forty years of judging…” — you know the rest.' },
  { at: 1e11, name: 'Purple Rosette', color: '#c026d3', mult: 1.12,
    flavor: 'Awarded once a century, to a garden rather than a carrot.' },
  { at: 1e13, name: 'The Judge’s Tears', color: '#67e8f9', mult: 1.15,
    flavor: 'There is no category for what you have grown. They give you the tears directly.' },
];

/* News ticker: shown when lifetime harvest ≥ min (and seeds ≥ minSeeds if set). */
CC.NEWS = [
  { min: 0, text: 'Your window box is the talk of the sill.' },
  { min: 0, text: 'Tip: carrots come out of the ground when you click them. Science!' },
  { min: 100, text: 'Local rabbit spotted “just looking.” Authorities unconvinced.' },
  { min: 500, text: 'The parsnip man has filed his first complaint.' },
  { min: 2000, text: 'Carrot shaped like a hand waves at commuters. Morale improves.' },
  { min: 10000, text: 'Scientists confirm carrots can hear. Sales of kind words triple.' },
  { min: 10000, text: 'The parsnip man’s second complaint is used to wrap carrots.' },
  { min: 50000, text: 'Row three declared a site of special horticultural interest.' },
  { min: 200000, text: 'Rabbit union demands: dental, hazard pay, and one (1) carrot each. Granted.' },
  { min: 200000, text: 'Carrot futures up. The Tomato winks at reporters.' },
  { min: 1e6, text: 'Nation switches to carrot-based economy “to see what happens.”' },
  { min: 1e6, text: 'The parsnip man attempts a rival stall. A single, silent rabbit watches him all day.' },
  { min: 1e7, text: 'Archaeologists find 12th-century carrot. It is still crunchy. Investigation ongoing.' },
  { min: 1e8, text: 'Carrot combine develops feelings. Given a small hat as compensation. Productivity soars.' },
  { min: 1e8, text: 'Weather forecast now sponsored by your greenhouse. Forecast: June.' },
  { min: 1e9, text: 'First carrot in orbit reports: “every direction is down.” Mission control weeps.' },
  { min: 1e9, text: 'The parsnip man concedes. You hire him. He is… actually great with compost?' },
  { min: 1e10, text: 'Moon declared “technically an allotment.” Committee approval pending.' },
  { min: 1e11, text: 'The Carrot Singularity hums a note only rabbits can hear. They approve.' },
  { min: 1e12, text: 'Interdimensional carrot monopoly denies being a monopoly in this dimension.' },
  { min: 1e13, text: 'Historians agree history was mostly leading up to this.' },
  { min: 0, minSeeds: 1, text: 'Botanists confirm: every carrot this year is a little bit you. Not a metaphor.' },
  { min: 0, minSeeds: 1, text: 'Heirloom seed prices soar. Yours are not for sale.' },
  { min: 0, minSeeds: 10, text: 'Tenth-generation carrots exhibit “ancestral memory of being clicked.”' },
];

CC.RABBIT_NEWS = [
  'A golden rabbit was seen! Clicked, negotiated with, and befriended.',
  'The golden rabbit strikes a deal. Everyone profits. Mostly you.',
];

/* ==== core.js ==== */
/* Carrot Clicker — pure game core: economy, upgrades, buffs, prestige, save.
   No DOM access; fully drivable headless (see clicker/test/sim.js). */
globalThis.CC = globalThis.CC || {};

CC.fmt = function (n) {
  if (!isFinite(n)) return '∞';
  if (n < 0) return '-' + CC.fmt(-n);
  if (n < 1000) return n < 10 && n % 1 !== 0 ? n.toFixed(1) : Math.floor(n).toString();
  const units = ['k', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
  let u = -1;
  while (n >= 1000 && u < units.length - 1) { n /= 1000; u++; }
  return (n >= 100 ? n.toFixed(0) : n >= 10 ? n.toFixed(1) : n.toFixed(2)) + units[u];
};

CC.Core = class {
  constructor() {
    this.bank = 0;
    this.totalAllTime = 0;        /* lifetime harvest, survives prestige */
    this.totalRun = 0;
    this.clicks = 0;
    this.owned = CC.BUILDINGS.map(() => 0);
    this.bought = {};             /* upgrade id -> true */
    this.seeds = 0;
    this.buffs = [];              /* {name, mult, left} */
    this.t = 0;
    this._ribbonCount = 0;
    this._bumperSeen = CC.BUILDINGS.map(() => 0);
  }

  /* ---------- upgrades ---------- */
  buildingUpgrades(i) {
    const b = CC.BUILDINGS[i];
    return CC.TIERS.map((t, ti) => ({
      id: `b${i}t${ti}`,
      type: 'building', b: i, need: t.need,
      cost: b.cost * t.costMult,
      name: t.prefix ? `${t.prefix} ${b.name}` : b.upName,
      flavor: t.prefix ? `${b.name} output doubled. Again. Nobody questions it anymore.` : b.upFlavor,
    }));
  }

  allUpgrades() {
    if (!this._upgrades) {
      this._upgrades = [];
      CC.BUILDINGS.forEach((b, i) => this._upgrades.push(...this.buildingUpgrades(i)));
      for (const u of CC.CLICK_UPGRADES) this._upgrades.push({ ...u, type: 'click' });
      for (const u of CC.GLOBAL_UPGRADES) this._upgrades.push({ ...u, type: 'global' });
      for (const u of CC.SYNERGY_UPGRADES) this._upgrades.push({ ...u, type: 'synergy' });
    }
    return this._upgrades;
  }

  upgradeVisible(u) {
    if (this.bought[u.id]) return false;
    if (u.type === 'building') return this.owned[u.b] >= u.need;
    if (u.type === 'synergy') return this.owned[u.target] >= u.needTarget && this.owned[u.per] >= u.needPer;
    return this.totalAllTime >= u.cost / 4;
  }

  visibleUpgrades() {
    return this.allUpgrades().filter(u => this.upgradeVisible(u)).sort((a, b) => a.cost - b.cost);
  }

  buyUpgrade(id) {
    const u = this.allUpgrades().find(u => u.id === id);
    if (!u || this.bought[id] || this.bank < u.cost || !this.upgradeVisible(u)) return false;
    this.bank -= u.cost;
    this.bought[id] = true;
    return true;
  }

  /* ---------- production ---------- */
  buildingMult(i) {
    let m = 1;
    for (let ti = 0; ti < CC.TIERS.length; ti++) if (this.bought[`b${i}t${ti}`]) m *= 2;
    for (const u of CC.SYNERGY_UPGRADES) {
      if (u.target === i && this.bought[u.id]) m *= 1 + u.pct * this.owned[u.per];
    }
    return m;
  }

  /* bumper crops: +1% global per owned-count milestone, per building type */
  bumperCount(i) {
    let n = 0;
    for (const at of CC.MILESTONES) if (this.owned[i] >= at) n++;
    return n;
  }
  bumperTotal() {
    let n = 0;
    for (let i = 0; i < CC.BUILDINGS.length; i++) n += this.bumperCount(i);
    return n;
  }
  nextBumperAt(i) {
    for (const at of CC.MILESTONES) if (this.owned[i] < at) return at;
    return null;
  }

  ribbons() { return CC.RIBBONS.filter(r => this.totalAllTime >= r.at); }

  globalMult() {
    let m = 1 + 0.08 * this.seeds;
    for (const r of this.ribbons()) m *= r.mult;
    for (const u of CC.GLOBAL_UPGRADES) if (this.bought[u.id]) m *= u.mult;
    m *= Math.pow(CC.MILESTONE_MULT, this.bumperTotal());
    return m;
  }

  buffMult() {
    let m = 1;
    for (const b of this.buffs) m *= b.mult;
    return m;
  }

  baseCps() {
    let c = 0;
    for (let i = 0; i < CC.BUILDINGS.length; i++) {
      c += this.owned[i] * CC.BUILDINGS[i].cps * this.buildingMult(i);
    }
    return c * this.globalMult();
  }

  cps() { return this.baseCps() * this.buffMult(); }

  clickPower() {
    let base = 1, pct = 0;
    for (const u of CC.CLICK_UPGRADES) {
      if (!this.bought[u.id]) continue;
      if (u.mult) base *= u.mult;
      if (u.cpsPct) pct += u.cpsPct;
    }
    return (base + pct * this.baseCps()) * this.buffMult();
  }

  /* ---------- actions ---------- */
  earn(n) { this.bank += n; this.totalAllTime += n; this.totalRun += n; }

  click() {
    const g = this.clickPower();
    this.earn(g);
    this.clicks++;
    return g;
  }

  costOf(i, count = 1) {
    /* geometric sum: cost * 1.15^owned * (1.15^count - 1) / 0.15 */
    const r = 1.15, c0 = CC.BUILDINGS[i].cost * Math.pow(r, this.owned[i]);
    return c0 * (Math.pow(r, count) - 1) / (r - 1);
  }

  buy(i, count = 1) {
    const cost = this.costOf(i, count);
    if (this.bank < cost) return false;
    this.bank -= cost;
    this.owned[i] += count;
    return true;
  }

  /* ---------- golden rabbit ---------- */
  rabbitReward(rng = Math.random) {
    if (rng() < 0.55) {
      this.buffs.push({ name: 'Rabbit Frenzy', mult: 7, left: 30 });
      return { kind: 'frenzy', text: 'RABBIT FRENZY! Production ×7 for 30 seconds!' };
    }
    const gain = Math.max(this.clickPower() * 20, Math.min(this.bank * 0.15, this.cps() * 600) + this.cps() * 60);
    this.earn(gain);
    return { kind: 'lucky', gain, text: `Lucky bundle! +${CC.fmt(gain)} carrots!` };
  }

  /* ---------- prestige ---------- */
  seedsEarnedTotal() { return Math.floor(Math.sqrt(this.totalAllTime / 1e6)); }
  pendingSeeds() { return Math.max(0, this.seedsEarnedTotal() - this.seeds); }

  prestige() {
    const gain = this.pendingSeeds();
    if (gain < 1) return 0;
    this.seeds += gain;
    this.bank = 0;
    this.totalRun = 0;
    this.owned = CC.BUILDINGS.map(() => 0);
    this.bought = {};
    this.buffs = [];
    this._bumperSeen = CC.BUILDINGS.map(() => 0);
    return gain;
  }

  /* ---------- tick ---------- */
  tick(dt) {
    this.t += dt;
    const events = [];
    this.earn(this.cps() * dt);
    for (const b of this.buffs) b.left -= dt;
    const expired = this.buffs.filter(b => b.left <= 0);
    this.buffs = this.buffs.filter(b => b.left > 0);
    for (const b of expired) events.push({ type: 'buffEnd', name: b.name });
    const rc = this.ribbons().length;
    if (rc > this._ribbonCount) {
      for (let k = this._ribbonCount; k < rc; k++) events.push({ type: 'ribbon', ribbon: CC.RIBBONS[k] });
      this._ribbonCount = rc;
    }
    for (let i = 0; i < CC.BUILDINGS.length; i++) {
      const n = this.bumperCount(i);
      if (n > this._bumperSeen[i]) {
        events.push({ type: 'bumper', b: i, owned: this.owned[i], at: CC.MILESTONES[n - 1] });
        this._bumperSeen[i] = n;
      }
    }
    return events;
  }

  /* ---------- save / load ---------- */
  serialize() {
    return {
      v: 1, bank: this.bank, totalAllTime: this.totalAllTime, totalRun: this.totalRun,
      clicks: this.clicks, owned: this.owned, bought: this.bought, seeds: this.seeds,
      last: Date.now(),
    };
  }

  deserialize(s) {
    if (!s || s.v !== 1) return { offline: 0 };
    this.bank = s.bank || 0;
    this.totalAllTime = s.totalAllTime || 0;
    this.totalRun = s.totalRun || 0;
    this.clicks = s.clicks || 0;
    this.owned = CC.BUILDINGS.map((_, i) => (s.owned && s.owned[i]) || 0);
    this.bought = s.bought || {};
    this.seeds = s.seeds || 0;
    this._ribbonCount = this.ribbons().length;
    this._bumperSeen = CC.BUILDINGS.map((_, i) => this.bumperCount(i));
    /* offline earnings: half rate, capped at 8 hours */
    let offline = 0;
    if (s.last) {
      const away = Math.min(Math.max(0, (Date.now() - s.last) / 1000), 8 * 3600);
      offline = this.baseCps() * away * 0.5;
      if (offline > 0) this.earn(offline);
    }
    return { offline };
  }
};

/* ==== net.js ==== */
/* Carrot Patch client — connects the clicker to a shared world server.
   Only activates when the page is served over http(s) and a same-origin
   /ws endpoint answers; on file://, artifacts, or plain static hosting the
   game silently stays single-player.

   Clicks are batched: they apply locally instantly for feel, accumulate in
   a counter, and flush as ONE message per second — an auto-clicker costs
   the same bandwidth as a patient human. The server clamps rates anyway. */
globalThis.CC = globalThis.CC || {};

CC.Patch = class {
  constructor(ui) {
    this.ui = ui;
    this.core = ui.core;
    this.on = false;
    this.pending = 0;
    this.online = 0;
    this.clickRate = 0;
    this._tried = false;
    if (!location.protocol.startsWith('http')) return;
    this.connect();
    setInterval(() => this.flush(), 1000);
  }

  wsUrl() {
    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    const dir = location.pathname.replace(/[^/]*$/, '');
    return proto + location.host + dir + 'ws';
  }

  connect() {
    let ws;
    try { ws = new WebSocket(this.wsUrl()); } catch (e) { return; }
    this.ws = ws;
    ws.onopen = () => {
      const first = !this._tried;
      this._tried = true;
      this.on = true;
      this.ui.setPatchMode(true);
      if (first) this.ui.toast('🌍 Connected to the CARROT PATCH — one garden, whole world.');
      else this.ui.toast('🌍 Reconnected to the patch.');
    };
    ws.onmessage = e => {
      let msg;
      try { msg = JSON.parse(e.data); } catch (err) { return; }
      this.handle(msg);
    };
    ws.onclose = () => {
      const was = this.on;
      this.on = false;
      if (was) {
        this.ui.setPatchMode(false);
        this.ui.toast('🌍 Lost the patch — retrying…');
      }
      if (this._tried) {
        /* we had a server once: keep trying, it may just be restarting */
        setTimeout(() => this.connect(), 4000);
      } else {
        /* never connected: probably plain static hosting — try thrice, then stay solo */
        this._attempts = (this._attempts || 0) + 1;
        if (this._attempts < 3) setTimeout(() => this.connect(), 5000);
      }
    };
    ws.onerror = () => { try { ws.close(); } catch (e) { /* already closed */ } };
  }

  handle(msg) {
    const c = this.core, ui = this.ui;
    if (msg.type === 'snapshot') {
      const s = msg.state;
      c.bank = s.bank;
      c.totalAllTime = s.totalAllTime;
      c.totalRun = s.totalRun;
      c.clicks = s.clicks;
      c.owned = s.owned.slice();
      c.bought = s.bought;
      c.seeds = s.seeds;
      c.buffs = s.buffs.map(b => ({ ...b }));
      c._ribbonCount = c.ribbons().length;
      c._bumperSeen = CC.BUILDINGS.map((_, i) => c.bumperCount(i));
      this.online = msg.online;
      this.clickRate = msg.clickRate;
      /* the golden rabbit is global: server says whether one is loose */
      if (msg.rabbitTtl > 0 && !ui.rabbit) {
        ui.rabbit = { x: -30, y: ui.soilY - 14, dir: 1, born: ui.t, patchTtl: msg.rabbitTtl };
      } else if (msg.rabbitTtl <= 0 && ui.rabbit) {
        ui.rabbit = null;
      }
      ui.updatePatchLine();
    } else if (msg.type === 'toast') {
      ui.toast(msg.text);
      if (msg.text.startsWith('🌸')) CC.audio.seed();
      else if (msg.text.startsWith('🐇')) CC.audio.rabbit();
    } else if (msg.type === 'rabbit') {
      ui.rabbit = { x: -30, y: ui.soilY - 14, dir: 1, born: ui.t, patchTtl: msg.ttl };
      ui.toast('🐇 A golden rabbit is loose in the patch — first click catches it!');
    }
  }

  send(obj) {
    if (this.on && this.ws.readyState === 1) this.ws.send(JSON.stringify(obj));
  }

  /* one message per second, no matter how fast anyone clicks */
  flush() {
    if (this.pending > 0) {
      this.send({ type: 'clicks', n: this.pending });
      this.pending = 0;
    }
  }
};

/* ==== ui.js ==== */
/* Carrot Clicker — UI: hero canvas, shop, upgrades, ticker, toasts, save. */
globalThis.CC = globalThis.CC || {};

CC.audio = {
  ctx: null, muted: false,
  ensure() {
    if (this.ctx || typeof AudioContext === 'undefined') return;
    this.ctx = new AudioContext();
    this.g = this.ctx.createGain();
    this.g.gain.value = 0.4;
    this.g.connect(this.ctx.destination);
  },
  blip(f, dur = 0.12, type = 'sine', vol = 0.15, slide = null, when = 0) {
    if (!this.ctx || this.muted) return;
    const t0 = this.ctx.currentTime + when;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(this.g);
    o.start(t0); o.stop(t0 + dur + 0.02);
  },
  pop() { this.blip(320 + Math.random() * 120, 0.09, 'triangle', 0.12, 160); },
  thunk() { this.blip(120, 0.15, 'sine', 0.18, 70); },
  upgrade() { this.blip(660, 0.15, 'triangle', 0.12); this.blip(990, 0.2, 'triangle', 0.1, null, 0.09); },
  fanfare() { [523, 659, 784, 1047].forEach((f, i) => this.blip(f, 0.35, 'triangle', 0.11, null, i * 0.11)); },
  rabbit() { this.blip(880, 0.1, 'sine', 0.14, 1320); this.blip(1320, 0.15, 'sine', 0.11, 1760, 0.1); },
  seed() { [392, 523, 659, 880, 1175].forEach((f, i) => this.blip(f, 0.4, 'triangle', 0.1, null, i * 0.14)); },
};

CC.UI = class {
  constructor(core) {
    this.core = core;
    this.$ = id => document.getElementById(id);
    this.canvas = this.$('hero');
    this.ctx = this.canvas.getContext('2d');
    this.t = 0;
    this.squash = 0;
    this.particles = [];
    this.floats = [];
    this.buyN = 1;
    this.rabbit = null;
    this.nextRabbit = 40 + Math.random() * 60;
    this.tickerT = 0;
    this._upgSig = null; this._shopSig = null;
    this._wipeArm = 0;

    this.store = (() => {
      try {
        localStorage.setItem('__cc_t', '1'); localStorage.removeItem('__cc_t');
        return localStorage;
      } catch (e) { return null; }
    })();

    this.buildStatic();
    this.load();
    this.bind();
    this.setTicker();
    this.tooltip(null);
    this._patchedOnce = false;
    this.patch = new CC.Patch(this);

    let last = performance.now();
    const frame = now => {
      const dt = Math.min(0.1, (now - last) / 1000);
      last = now;
      this.t += dt;
      this.update(dt);
      this.render();
      requestAnimationFrame(frame);
    };
    requestAnimationFrame(frame);
  }

  /* ---------------- patch (global) mode ---------------- */
  patchOn() { return !!(this.patch && this.patch.on); }

  setPatchMode(on) {
    if (on) this._patchedOnce = true; /* never overwrite the solo save with world state */
    document.querySelector('.wordmark span').textContent = on ? 'PATCH' : 'CLICKER';
    this.$('patch-line').classList.toggle('hidden', !on);
    this.updatePatchLine();
  }

  updatePatchLine() {
    if (this.patchOn()) {
      this.$('patch-line').textContent =
        `🌍 ${this.patch.online} gardener${this.patch.online === 1 ? '' : 's'} tending · ${CC.fmt(this.patch.clickRate)} clicks/s worldwide`;
    }
  }

  /* ---------------- persistence ---------------- */
  save() {
    if (this._patchedOnce) return; /* world state lives on the server */
    if (this.store) this.store.setItem('carrot-clicker-save', JSON.stringify(this.core.serialize()));
  }
  load() {
    if (!this.store) return;
    try {
      const raw = this.store.getItem('carrot-clicker-save');
      if (!raw) return;
      const { offline } = this.core.deserialize(JSON.parse(raw));
      if (offline > 1) this.toast(`While you were away, the garden grew: +${CC.fmt(offline)} 🥕`);
    } catch (e) { /* corrupted save: start fresh */ }
  }

  /* ---------------- DOM scaffolding ---------------- */
  buildStatic() {
    /* pre-render soil texture */
    const c = document.createElement('canvas');
    c.width = this.canvas.width; c.height = this.canvas.height;
    const x = c.getContext('2d');
    const soilY = 132;
    const sky = x.createLinearGradient(0, 0, 0, soilY);
    sky.addColorStop(0, '#5a4a7a');
    sky.addColorStop(0.7, '#c98a5a');
    sky.addColorStop(1, '#e8b06a');
    x.fillStyle = sky;
    x.fillRect(0, 0, c.width, soilY);
    /* sun */
    const sun = x.createRadialGradient(250, 60, 0, 250, 60, 60);
    sun.addColorStop(0, 'rgba(255,240,190,0.95)');
    sun.addColorStop(1, 'rgba(255,220,120,0)');
    x.fillStyle = sun;
    x.fillRect(180, 0, 140, 130);
    /* hedge */
    x.fillStyle = '#31502e';
    x.fillRect(0, soilY - 16, c.width, 16);
    const soil = x.createLinearGradient(0, soilY, 0, c.height);
    soil.addColorStop(0, '#4a3421');
    soil.addColorStop(1, '#2a2016');
    x.fillStyle = soil;
    x.fillRect(0, soilY, c.width, c.height - soilY);
    for (let i = 0; i < 900; i++) {
      const px = Math.random() * c.width, py = soilY + Math.random() * (c.height - soilY);
      x.fillStyle = Math.random() < 0.5 ? 'rgba(0,0,0,0.15)' : 'rgba(190,150,100,0.08)';
      x.fillRect(px, py, 1.5 + Math.random() * 2, 1.5 + Math.random() * 2);
    }
    this.bg = c;
    this.soilY = soilY;

    /* shop rows */
    const shop = this.$('shop');
    this.rows = CC.BUILDINGS.map((b, i) => {
      const row = document.createElement('div');
      row.className = 'b-row';
      row.innerHTML = `<div><div class="b-name"></div><div class="b-cost"></div></div><div class="b-count"></div>`;
      row.addEventListener('click', e => this.buyBuilding(i, e.shiftKey ? 10 : this.buyN));
      row.addEventListener('mouseenter', () => this.tooltip({ kind: 'building', i }));
      row.addEventListener('mouseleave', () => this.tooltip(null));
      shop.appendChild(row);
      return row;
    });

    /* ribbon shelf */
    const shelf = this.$('ribbons');
    this.ribbonEls = CC.RIBBONS.map(r => {
      const el = document.createElement('div');
      el.className = 'ribbon locked';
      el.style.background = r.color;
      el.addEventListener('mouseenter', () => this.tooltip({ kind: 'ribbon', r }));
      el.addEventListener('mouseleave', () => this.tooltip(null));
      shelf.appendChild(el);
      return el;
    });
  }

  bind() {
    this.canvas.addEventListener('pointerdown', e => {
      CC.audio.ensure();
      const rect = this.canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (this.canvas.width / rect.width);
      const my = (e.clientY - rect.top) * (this.canvas.height / rect.height);
      if (this.rabbit && Math.hypot(mx - this.rabbit.x, my - this.rabbit.y) < 34) {
        this.catchRabbit();
        return;
      }
      this.doClick(mx, my);
    });
    this.$('buy-amount').addEventListener('click', e => {
      if (e.target.dataset.n) {
        this.buyN = +e.target.dataset.n;
        for (const b of this.$('buy-amount').children) b.classList.toggle('on', +b.dataset.n === this.buyN);
      }
    });
    this.$('prestige-btn').addEventListener('click', () => this.askPrestige());
    this.$('prestige-btn').addEventListener('mouseenter', () => this.tooltip({ kind: 'prestige' }));
    this.$('prestige-btn').addEventListener('mouseleave', () => this.tooltip(null));
    this.$('mute-btn').addEventListener('click', () => {
      CC.audio.ensure();
      CC.audio.muted = !CC.audio.muted;
      this.$('mute-btn').textContent = CC.audio.muted ? '🔇' : '🔊';
    });
    this.$('wipe-btn').addEventListener('click', () => {
      if (this.t - this._wipeArm < 3) {
        if (this.store) this.store.removeItem('carrot-clicker-save');
        location.reload();
      } else {
        this._wipeArm = this.t;
        this.toast('Click 🗑 again within 3s to wipe your save.');
      }
    });
    this.$('modal-no').addEventListener('click', () => this.$('modal').classList.add('hidden'));
    setInterval(() => this.save(), 15000);
    addEventListener('beforeunload', () => this.save());
    document.addEventListener('visibilitychange', () => { if (document.hidden) this.save(); });
  }

  /* ---------------- actions ---------------- */
  doClick(mx, my) {
    const g = this.core.click();
    if (this.patchOn()) this.patch.pending++;
    this.squash = 1;
    CC.audio.pop();
    this.floats.push({ x: mx, y: my, vy: -55, life: 1, text: `+${CC.fmt(g)}` });
    for (let i = 0; i < 6; i++) {
      this.particles.push({
        x: 160 + (Math.random() - 0.5) * 40, y: this.soilY + 6,
        vx: (Math.random() - 0.5) * 160, vy: -90 - Math.random() * 120,
        life: 0.7 + Math.random() * 0.4,
        col: Math.random() < 0.6 ? '#5a4128' : '#ff9232',
      });
    }
  }

  buyBuilding(i, n) {
    CC.audio.ensure();
    if (this.patchOn()) {
      /* intent only — the next snapshot carries the world's answer */
      if (this.core.bank >= this.core.costOf(i, 1)) CC.audio.thunk();
      this.patch.send({ type: 'buy', b: i, n });
      return;
    }
    let bought = 0;
    while (bought < n && this.core.buy(i, 1)) bought++;
    if (bought > 0) CC.audio.thunk();
  }

  buyUpgrade(id) {
    CC.audio.ensure();
    if (this.patchOn()) {
      this.patch.send({ type: 'upgrade', id });
      this.tooltip(null);
      return;
    }
    if (this.core.buyUpgrade(id)) {
      CC.audio.upgrade();
      this.tooltip(null);
    }
  }

  catchRabbit() {
    if (this.patchOn()) {
      this.patch.send({ type: 'catch' });
      this.rabbit = null; /* server will announce who-caught-what */
      return;
    }
    const r = this.core.rabbitReward();
    this.rabbit = null;
    this.nextRabbit = this.t + 75 + Math.random() * 105;
    CC.audio.rabbit();
    this.toast(`🐇 ${r.text}`);
    this.$('ticker-text').textContent = CC.RABBIT_NEWS[Math.floor(Math.random() * CC.RABBIT_NEWS.length)];
    this.tickerT = -6;
  }

  askPrestige() {
    const n = this.core.pendingSeeds();
    if (n < 1) return;
    const patch = this.patchOn();
    this.$('modal-title').textContent = patch ? '🌸 Send the WORLD to Seed?' : '🌸 Go to Seed?';
    this.$('modal-body').innerHTML = (patch
      ? `This is the <b>shared garden</b>. Going to seed resets it for <b>every gardener on Earth</b> —`
      : `Let go of every plot, stall, and contract. The garden resets to bare soil —`) +
      ` but ribbons are kept, and everyone gains <b>${CC.fmt(n)} seed${n > 1 ? 's' : ''}</b>.` +
      `<br><br>Each seed boosts all production by <b>+8%, forever</b>.` +
      (patch ? `<br><br><i>Your name will not be recorded. Your deed will be felt.</i>` : '');
    const yes = this.$('modal-yes');
    yes.textContent = `Go to seed (+${CC.fmt(n)})`;
    yes.onclick = () => {
      this.$('modal').classList.add('hidden');
      if (patch) {
        this.patch.send({ type: 'prestige' });
        return; /* the server announces it to the world */
      }
      const gained = this.core.prestige();
      CC.audio.seed();
      this.toast(`🌸 Second spring. +${CC.fmt(gained)} seeds — production +${gained * 8}% forever.`);
      this.save();
    };
    this.$('modal').classList.remove('hidden');
  }

  /* ---------------- feedback ---------------- */
  toast(text) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = text;
    this.$('toasts').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.6s'; }, 4200);
    setTimeout(() => el.remove(), 5000);
  }

  tooltip(what) {
    const tip = this.$('tooltip');
    tip.classList.remove('hidden');
    if (!what) {
      tip.innerHTML = `<span class="flavor">Click the carrot. The rest follows.</span>`;
      return;
    }
    if (what.kind === 'building') {
      const b = CC.BUILDINGS[what.i], core = this.core;
      const each = b.cps * core.buildingMult(what.i) * core.globalMult();
      const owned = core.owned[what.i];
      const next = core.nextBumperAt(what.i);
      tip.innerHTML = `<b>${b.name}</b> — ${CC.fmt(core.costOf(what.i, this.buyN))} 🥕` +
        `<br>Each produces <b>${CC.fmt(each)}</b>/s` +
        (owned ? ` · ${owned} owned making ${CC.fmt(each * owned)}/s` : '') +
        (next ? `<br>🌾 Bumper crop at <b>${next}</b> owned: +1% to ALL production` : '<br>🌾 Every bumper crop harvested!') +
        `<br><span class="flavor">${b.flavor}</span>`;
    } else if (what.kind === 'upgrade') {
      const u = what.u;
      tip.innerHTML = `<b>${u.name}</b> — ${CC.fmt(u.cost)} 🥕<br><span class="flavor">${u.flavor}</span>`;
    } else if (what.kind === 'ribbon') {
      const r = what.r, won = this.core.totalAllTime >= r.at;
      tip.innerHTML = `<b>${r.name}</b> — ${won ? `+${Math.round((r.mult - 1) * 100)}% production` : `awarded at ${CC.fmt(r.at)} lifetime carrots`}` +
        `<br><span class="flavor">${won ? r.flavor : '???'}</span>`;
    } else if (what.kind === 'prestige') {
      tip.innerHTML = `<b>Go to Seed</b> — prestige reset<br>` +
        `Seeds so far: earned at √(lifetime ÷ 1M). Each seed = +8% production, permanently.` +
        `<br><span class="flavor">Every carrot next year is a little bit you.</span>`;
    }
  }

  setTicker() {
    const c = this.core;
    const pool = CC.NEWS.filter(n => c.totalAllTime >= n.min && c.seeds >= (n.minSeeds || 0));
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const el = this.$('ticker-text');
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = pick ? pick.text : ''; el.style.opacity = '1'; }, 400);
  }

  /* ---------------- per-frame ---------------- */
  update(dt) {
    const events = this.core.tick(dt);
    /* in patch mode the server announces ribbons/bumpers to everyone */
    if (!this.patchOn()) {
      for (const e of events) {
        if (e.type === 'ribbon') {
          CC.audio.fanfare();
          this.toast(`🎀 ${e.ribbon.name}! ${e.ribbon.flavor} (+${Math.round((e.ribbon.mult - 1) * 100)}% production)`);
        } else if (e.type === 'bumper') {
          CC.audio.upgrade();
          this.toast(`🌾 Bumper crop! ${e.at}× ${CC.BUILDINGS[e.b].name} — +1% to everything.`);
        }
      }
    }

    /* golden rabbit lifecycle (locally scheduled only in solo mode) */
    if (!this.patchOn() && !this.rabbit && this.t >= this.nextRabbit) {
      this.rabbit = { x: -30, y: this.soilY - 14, dir: 1, born: this.t };
    }
    if (this.rabbit) {
      const r = this.rabbit;
      r.x += r.dir * 55 * dt;
      if (r.x > this.canvas.width - 20) r.dir = -1;
      if (r.x < 20 && r.dir === -1) r.dir = 1;
      if (this.t - r.born > (r.patchTtl || 12)) {
        this.rabbit = null;
        this.nextRabbit = this.t + 75 + Math.random() * 105;
      }
    }

    /* particles & floats */
    for (const p of this.particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 420 * dt; p.life -= dt; }
    this.particles = this.particles.filter(p => p.life > 0);
    for (const f of this.floats) { f.y += f.vy * dt; f.life -= dt * 0.9; }
    this.floats = this.floats.filter(f => f.life > 0);
    if (this.squash > 0) this.squash = Math.max(0, this.squash - dt * 6);

    this.tickerT += dt;
    if (this.tickerT > 9) { this.tickerT = 0; this.setTicker(); }

    this.updateDOM();
  }

  updateDOM() {
    const c = this.core;
    this.$('bank').textContent = CC.fmt(Math.floor(c.bank));
    this.$('cps').textContent = `${CC.fmt(c.cps())} per second · click for ${CC.fmt(c.clickPower())}`;

    const buff = c.buffs[0];
    this.$('buff-line').textContent = buff ? `⚡ ${buff.name} ×${buff.mult} — ${Math.ceil(buff.left)}s` : '';

    this.$('seed-line').textContent = c.seeds > 0
      ? `🌸 ${CC.fmt(c.seeds)} seeds — +${c.seeds * 8}% forever` : '';

    const pending = c.pendingSeeds();
    const pb = this.$('prestige-btn');
    pb.classList.toggle('hidden', pending < 1);
    if (pending >= 1) pb.textContent = `🌸 Go to Seed (+${CC.fmt(pending)})`;

    /* shop rows */
    const shopSig = c.owned.join(',') + '|' + Math.floor(this.t * 4);
    if (shopSig !== this._shopSig) {
      this._shopSig = shopSig;
      let revealed = 0;
      CC.BUILDINGS.forEach((b, i) => {
        const row = this.rows[i];
        const known = i === 0 || c.owned[i] > 0 || c.totalAllTime >= b.cost / 5;
        const isNextMystery = !known && revealed === i;
        if (known) revealed++;
        row.classList.toggle('hidden', !known && !isNextMystery);
        row.classList.toggle('mystery', isNextMystery);
        const cost = c.costOf(i, this.buyN);
        row.classList.toggle('cant', isNextMystery || c.bank < cost);
        const next = c.nextBumperAt(i);
        row.querySelector('.b-name').textContent = isNextMystery ? '???' : b.name;
        row.querySelector('.b-cost').textContent = isNextMystery ? ''
          : `${CC.fmt(cost)} 🥕${this.buyN > 1 ? ` ×${this.buyN}` : ''}` +
            (c.owned[i] > 0 && next ? `  ·  🌾${c.owned[i]}/${next}` : '');
        row.querySelector('.b-count').textContent = c.owned[i] || '';
      });
    }

    /* upgrades */
    const ups = c.visibleUpgrades().slice(0, 12);
    const sig = ups.map(u => u.id + (c.bank >= u.cost ? '+' : '-')).join(',');
    if (sig !== this._upgSig) {
      this._upgSig = sig;
      const box = this.$('upgrades');
      box.innerHTML = '';
      for (const u of ups) {
        const el = document.createElement('div');
        el.className = 'upgrade' + (c.bank < u.cost ? ' cant' : '');
        el.innerHTML = `<b>${u.name}</b><span class="cost">${CC.fmt(u.cost)} 🥕</span>`;
        el.addEventListener('click', () => this.buyUpgrade(u.id));
        el.addEventListener('mouseenter', () => this.tooltip({ kind: 'upgrade', u }));
        el.addEventListener('mouseleave', () => this.tooltip(null));
        box.appendChild(el);
      }
      if (!ups.length) box.innerHTML = '<span style="color:#b8a98c;font-size:12px">Nothing on the shelf right now — keep growing.</span>';
    }

    /* ribbons */
    CC.RIBBONS.forEach((r, i) => this.ribbonEls[i].classList.toggle('locked', c.totalAllTime < r.at));

    /* stats (re-rendered only when the text actually changes) */
    {
      const totalBuildings = c.owned.reduce((a, b) => a + b, 0);
      const bumpers = c.bumperTotal();
      const html =
        `<div>Lifetime harvest <b>${CC.fmt(c.totalAllTime)}</b></div>` +
        `<div>This spring <b>${CC.fmt(c.totalRun)}</b></div>` +
        `<div>Hand-pulled (clicks) <b>${CC.fmt(c.clicks)}</b></div>` +
        `<div>Plots &amp; contraptions <b>${CC.fmt(totalBuildings)}</b></div>` +
        `<div>Bumper crops 🌾 <b>${bumpers} (+${Math.round((Math.pow(CC.MILESTONE_MULT, bumpers) - 1) * 100)}%)</b></div>` +
        `<div>Production bonus <b>×${c.globalMult().toFixed(2)}</b></div>` +
        `<div>Next seed at <b>${CC.fmt(Math.pow(c.seedsEarnedTotal() + 1, 2) * 1e6)}</b></div>`;
      if (html !== this._statHtml) {
        this._statHtml = html;
        this.$('stats').innerHTML = html;
      }
    }
  }

  /* ---------------- canvas ---------------- */
  render() {
    const x = this.ctx, W = this.canvas.width, H = this.canvas.height;
    x.drawImage(this.bg, 0, 0);
    const c = this.core;

    /* frenzy glow */
    if (c.buffMult() > 1) {
      x.fillStyle = `rgba(255,150,40,${0.08 + Math.sin(this.t * 6) * 0.05})`;
      x.fillRect(0, 0, W, H);
    }

    /* the carrot: grows with lifetime harvest */
    const size = 0.55 + Math.min(1.35, Math.log10(1 + c.totalAllTime) * 0.11);
    const cx = W / 2, crownY = this.soilY + 4;
    const bodyLen = 120 * size, girth = 26 * size;
    const sq = 1 - this.squash * 0.12;
    x.save();
    x.translate(cx, crownY);
    x.scale(2 - sq, sq);

    /* tops */
    const nStems = 7;
    for (let i = 0; i < nStems; i++) {
      const f = i / (nStems - 1) - 0.5;
      const sway = Math.sin(this.t * 1.7 + i * 1.3) * 6;
      const h = (46 + Math.abs(f) * -14) * size;
      x.strokeStyle = '#3f9142';
      x.lineWidth = 3 * size;
      x.beginPath();
      x.moveTo(f * 10 * size, -2);
      x.quadraticCurveTo(f * 26 * size + sway * 0.5, -h * 0.6, f * 44 * size + sway, -h);
      x.stroke();
      x.lineWidth = 1.6 * size;
      for (let k = 2; k <= 4; k++) {
        const q = k / 5;
        const lx = f * 44 * size * q + sway * q, ly = -h * (0.35 + q * 0.6);
        const ll = 9 * size * (1 - q * 0.3);
        x.beginPath();
        x.moveTo(lx - ll, ly + ll * 0.6); x.lineTo(lx, ly); x.lineTo(lx + ll, ly + ll * 0.6);
        x.stroke();
      }
    }
    x.restore();

    x.save();
    x.translate(cx, crownY);
    x.scale(sq, 2 - sq);
    /* body */
    const grad = x.createLinearGradient(0, 0, 0, bodyLen);
    grad.addColorStop(0, '#ff9232');
    grad.addColorStop(1, '#d4570a');
    x.fillStyle = grad;
    x.beginPath();
    x.moveTo(-girth, 2);
    x.quadraticCurveTo(-girth * 0.85, bodyLen * 0.55, -girth * 0.12, bodyLen);
    x.lineTo(girth * 0.12, bodyLen);
    x.quadraticCurveTo(girth * 0.85, bodyLen * 0.55, girth, 2);
    x.closePath();
    x.fill();
    /* ridges */
    x.strokeStyle = 'rgba(140,50,0,0.3)';
    x.lineWidth = 2;
    for (let k = 1; k <= 5; k++) {
      const q = k / 6, hw = girth * (1 - q) * 0.85;
      x.beginPath();
      x.moveTo(-hw, bodyLen * q); x.lineTo(hw, bodyLen * q);
      x.stroke();
    }
    /* shoulders above soil */
    x.fillStyle = '#e8760f';
    x.beginPath();
    x.ellipse(0, 1, girth, 6 * size, 0, Math.PI, 0);
    x.fill();
    x.restore();

    /* golden rabbit */
    if (this.rabbit) {
      const r = this.rabbit;
      const hop = -Math.abs(Math.sin(this.t * 8)) * 9;
      x.save();
      x.translate(r.x, r.y + hop);
      if (r.dir === -1) x.scale(-1, 1);
      const glow = x.createRadialGradient(0, 0, 0, 0, 0, 30);
      glow.addColorStop(0, 'rgba(255,215,90,0.55)');
      glow.addColorStop(1, 'rgba(255,215,90,0)');
      x.fillStyle = glow;
      x.beginPath(); x.arc(0, 0, 30, 0, Math.PI * 2); x.fill();
      x.fillStyle = '#e8c25a';
      x.beginPath(); x.ellipse(0, 0, 14, 9, 0, 0, Math.PI * 2); x.fill();
      x.beginPath(); x.ellipse(12, -5, 7, 6, 0, 0, Math.PI * 2); x.fill();
      x.fillStyle = '#d4a83a';
      x.beginPath(); x.ellipse(10, -14, 2.2, 7, -0.15, 0, Math.PI * 2); x.fill();
      x.beginPath(); x.ellipse(14, -13.5, 2.2, 6.5, 0.2, 0, Math.PI * 2); x.fill();
      x.fillStyle = '#fff8e0';
      x.beginPath(); x.arc(-13, -1, 3.5, 0, Math.PI * 2); x.fill();
      x.fillStyle = '#2a221a';
      x.beginPath(); x.arc(13.5, -6, 1.1, 0, Math.PI * 2); x.fill();
      x.restore();
    }

    /* particles */
    for (const p of this.particles) {
      x.globalAlpha = Math.min(1, p.life * 2);
      x.fillStyle = p.col;
      x.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    x.globalAlpha = 1;

    /* floating +N */
    x.font = 'bold 15px system-ui, sans-serif';
    x.textAlign = 'center';
    for (const f of this.floats) {
      x.globalAlpha = Math.min(1, f.life * 1.6);
      x.fillStyle = '#ffd98a';
      x.fillText(f.text, f.x, f.y);
    }
    x.globalAlpha = 1;
  }
};

/* ---------------- bootstrap ---------------- */
if (typeof document !== 'undefined') {
  addEventListener('DOMContentLoaded', () => {
    globalThis.game = new CC.UI(new CC.Core());
    const grant = new URLSearchParams(location.search).get('grant');
    if (grant) game.core.earn(+grant); /* debug/testing */
  });
}

</script>
</body>
</html>
